version: "3.9"

services:
  orchestrator:
    build:
      context: ..
      dockerfile: infra/Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - ../.env
    environment:
      - SERVICE_NAME=orchestrator
    networks:
      - support-network
    depends_on:
      - triage-agent
      - resolution-agent
      - draft-agent

  triage-agent:
    build:
      context: ..
      dockerfile: infra/Dockerfile
    command: uvicorn triage_agent.main:app --host 0.0.0.0 --port 8001
    ports:
      - "8001:8001"
    env_file:
      - ../.env
    networks:
      - support-network

  resolution-agent:
    build:
      context: ..
      dockerfile: infra/Dockerfile
    command: uvicorn resolution_agent.main:app --host 0.0.0.0 --port 8002
    ports:
      - "8002:8002"
    env_file:
      - ../.env
    networks:
      - support-network

  draft-agent:
    build:
      context: ..
      dockerfile: infra/Dockerfile
    command: uvicorn draft_agent.main:app --host 0.0.0.0 --port 8003
    ports:
      - "8003:8003"
    env_file:
      - ../.env
    networks:
      - support-network

networks:
  support-network:
    driver: bridge
